<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Allyhasthefilm</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <nav class="nav-container">
            <div class="logo">Allyhasthefilm</div>
            <ul class="nav-links">
                <li><a href="#home" class="tab-link active">Home</a></li>
                <li><a href="#gallery" class="tab-link">Gallery</a></li>
                <li><a href="#about" class="tab-link">About</a></li>
                <li><a href="#contact" class="tab-link">Contact</a></li>
            </ul>
        </nav>
    </header>

    <!-- HOME -->


    <section id="home">
    <div class="hero-content">
        <img src="images/photo6.JPEG" alt="Featured Work" class="single-featured-photo">
    </div>
</section>



    <!-- GALLERY -->
    <section id="gallery" class="hidden">
        <h2 class="section-title">Gallery</h2>
        <div class="gallery-grid">
            <div class="gallery-item">
                   <img src="images/photo1.jpg" alt="photo1">
                <!-- <div class="photo-overlay"><p>Mountain Majesty</p></div> -->
            </div>
            <div class="gallery-item">
                     <img src="images/photo3.jpg" alt="photo1">
                <!-- <div class="photo-overlay"><p>Deep Woods</p></div> -->
            </div>
            <div class="gallery-item">
                           <img src="images/photo4.jpg" alt="photo1">
                <!-- <div class="photo-overlay"><p>Mountain Majesty</p></div> -->
            </div>
            <div class="gallery-item">
                               <img src="images/photo5.JPEG" alt="photo1">
                <!-- <div class="photo-overlay"><p>Mountain Majesty</p></div> -->
            </div>
            <div class="gallery-item">
                              <img src="images/photo6.JPEG" alt="photo1">
                <!-- <div class="photo-overlay"><p>Mountain Majesty</p></div> -->
            </div>
            <div class="gallery-item">
                               <img src="images/photo7.JPEG" alt="photo1">
                <!-- <div class="photo-overlay"><p>Mountain Majesty</p></div> -->
            </div>
        </div>
    </section>

    <!-- ABOUT -->
    <section id="about" class="hidden">
        <h2 class="section-title">About</h2>
        <div class="about-content">
            <div class="about-img">
                <img src="images/about.png" alt="ally">

            </div>
            <div class="about-text">
                <p>about me text here</p>

            </div>
        </div>
    </section>

    <!-- CONTACT -->
<section id="contact" class="hidden">
        <h2 class="section-title">Contact</h2>
        
        <div class="contact-container">
            <div class="contact-info-stacked">
<p> allyhasthefilm@gmail.com</p>
            </div>

            <form class="contact-form" id="contactForm">
                <div class="form-group">
                    <input type="text" id="name" placeholder="NAME" required>
                </div>
                <div class="form-group">
                    <input type="email" id="email" placeholder="EMAIL" required>
                </div>
                <div class="form-group">
                    <textarea id="message" placeholder="MESSAGE" required></textarea>
                </div>
                <button type="submit" class="btn submit-btn">Send Message</button>
            </form>
        </div>
    </section>

    <div id="lightbox" class="lightbox">
        <span class="lightbox-close">&times;</span>
        <img class="lightbox-content" id="lightboxImg" src="" alt="Enlarged view">
    </div>

    <footer>
        <p>&copy; 2026 AllyhastheFilm</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
